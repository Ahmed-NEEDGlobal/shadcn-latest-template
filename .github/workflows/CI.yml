name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions:
  contents: read

jobs:
  # Job 1: Check commit messages
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for commitlint to see history

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install dependencies
        run: bun install --no-frozen-lockfile

      - name: Validate current commit (on push)
        if: github.event_name == 'push'
        run: bunx commitlint --last --verbose

      - name: Validate PR commits
        if: github.event_name == 'pull_request'
        run:
          bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to
          ${{ github.event.pull_request.head.sha }} --verbose

  # Job 2: Build the Next.js project
  build:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore Bun Cache
        uses: actions/cache@v3
        with:
          path: ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install dependencies
        run: bun install --no-frozen-lockfile

      - name: Build
        run: bun run build
